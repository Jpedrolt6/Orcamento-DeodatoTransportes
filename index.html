<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Orçamento Transportadora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <!-- evita 404 do favicon -->
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="wrap">
    <header class="hero glass">
      <div class="brand">
        <div class="logo">📦</div>
        <div class="title">
          <h1>Deodato Transportes</h1>
          <p>Orçamento rápido com endereços do Google</p>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="card glass">
        <h2>Endereços</h2>

        <div class="field">
  <label for="origem">Retirada</label>

  <div class="input-clear">
    <input id="origem" type="text"
      placeholder="Digite o endereço de retirada"
      autocomplete="on">

    <button class="clear-btn" type="button" data-target="origem">
      ✕
    </button>
  </div>
</div>

<div id="paradas"></div>

<button class="ghost" id="btnAddParada" type="button">
  + Adicionar parada
</button>

<div class="field">
  <label for="destino">Entrega</label>

  <div class="input-clear">
    <input id="destino" type="text"
      placeholder="Digite o endereço de entrega"
      autocomplete="on">

    <button class="clear-btn" type="button" data-target="destino">
      ✕
    </button>
  </div>
</div>
        <div class="row">
          <div class="field small">
            <label for="servico">Serviço</label>
            <select id="servico">
              <option value="moto">Motoboy</option>
              <option value="carro">Carro</option>
              <option value="fiorino">Fiorino / Picapes</option>
              <option value="hr_ducato">HR / Ducato</option>
              <option value="iveco_master">Iveco / Master</option>
            </select>
          </div>

          <!-- começa escondido; o JS mostra quando "Motoboy" está selecionado -->
          <div class="field small" id="motoTipoRow" style="display:none">
            <label for="motoTipo">Tipo (moto)</label>
            <select id="motoTipo">
            
              <option value="bau">Baú</option>
            
            </select>
          </div>
        </div>

        <!-- ================= CUPOM DE DESCONTO ================= -->
        <div class="cupom-box">
          <label for="couponInput">Cupom de desconto</label>
          <div class="cupom-row">
            <input id="couponInput" type="text" placeholder="Digite seu cupom" autocomplete="off" />
            <button id="applyCouponBtn" type="button">Aplicar</button>
          </div>
          <small id="couponMsg"></small>
        </div>
        <style>
          .cupom-box{margin-top:12px}
          .cupom-row{display:flex;gap:8px}
          #couponMsg{display:block;margin-top:6px;opacity:.9}
        </style>
        <!-- ===================================================== -->

        <div class="actions">
          <button class="primary" id="btnCalcular" type="button">Calcular</button>
          <!-- Botão do Whats foi movido para o Resumo -->
        </div>
      </section>

      <aside class="card glass">
        <h2>Resumo</h2>
        <div id="resumo" class="resumo">
          <!-- DISTÂNCIA -->
          <div class="metric">
            <span class="lbl">Distância</span>
            <span class="val" id="mDist">—</span>
          </div>

          <!-- CUPOM (entre Distância e Valor) -->
          <div id="resumoCupomCard" class="resumo-pill" style="display:none;">
            <span>Cupom</span>
            <strong id="resumoCupomValue">-</strong>
          </div>

          <!-- estilo do pill -->
          <style>
            .resumo-pill{
              background: rgba(255,255,255,0.06);
              border-radius: 12px;
              padding: 10px 14px;
              display: flex; justify-content: space-between; align-items: center;
              margin: 8px 0;
            }
            #resumoCupomCard strong{ font-weight: 700; }
          </style>

          <!-- VALOR -->
          <div class="metric">
            <span class="lbl">Valor</span>
            <span class="val" id="mValor">—</span>
          </div>

          <div class="rules">
            <h3>Regras do serviço</h3>
            <ul>
              <li>Baú máx.: 44 × 42 × 32 cm</li>
              <li>Peso máx.: 20 kg</li>
              <li>Espera: R$ 0,60/min após 15 min</li>
            </ul>
          </div>

          <!-- Aparece só após cálculo OK -->
          <a class="cta wa hide" id="btnWhats" href="#" target="_blank" rel="noopener">Enviar Orçamento no WhatsApp</a>

          <button class="outline" id="btnLimpar" type="button">Limpar tudo</button>
        </div>
      </aside>
    </main>

    <footer class="foot">
      <p>© Deodato Transportes — São Paulo • Brasil</p>
    </footer>
  </div>

  <!-- 1) Seu app primeiro -->
  <script src="app.js?v=14" defer></script>

  <!-- 2) Callback global robusto (evita condição de corrida no reload) -->
  <script>
    (function () {
      let started = false;

      function mapsReady() {
        return !!(window.google && google.maps && google.maps.places);
      }

      function tryStart() {
        if (started) return;
        if (typeof window.initApp === "function" && mapsReady()) {
          started = true;
          try { window.initApp(); } catch (e) { console.error(e); }
        } else {
          setTimeout(tryStart, 50);
        }
      }

      // chamado pelo ?callback=initOrcamento
      window.initOrcamento = function () {
        tryStart();
      };

      // fallback extra caso o callback não dispare por algum motivo
      document.addEventListener("DOMContentLoaded", tryStart);
    })();
  </script>

  <!-- 3) Loader do Maps com Places e callback -->
  <script
    async defer
    referrerpolicy="origin"
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhGvrR_Gp4e0ROB1BInjNBSUQdHEh6ews&libraries=places&v=weekly&loading=async&language=pt-BR&region=BR&callback=initOrcamento">
  </script>
</body>
</html>
